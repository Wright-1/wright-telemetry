name: Build Windows

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        env:
          WRIGHT_LOKI_AUTH: ${{ secrets.LOKI_BASIC_AUTH }}
        run: pyinstaller wright-telemetry.spec

      - name: Verify executable runs
        run: dist\wright-telemetry.exe --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wright-telemetry-windows
          path: dist/wright-telemetry.exe
          if-no-files-found: error

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/wright-telemetry.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
