name: Build macOS

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync __version__ from release tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          python <<'PY'
          import os, re, pathlib
          ref = os.environ["GITHUB_REF"]
          if not ref.startswith("refs/tags/v"):
              raise SystemExit(f"unexpected GITHUB_REF: {ref!r}")
          ver = ref.removeprefix("refs/tags/").removeprefix("v")
          p = pathlib.Path("wright_telemetry/__init__.py")
          t = p.read_text(encoding="utf-8")
          nt, n = re.subn(
              r'^(__version__\s*=\s*")[^"]*(")',
              lambda m, ver=ver: m.group(1) + ver + m.group(2),
              t,
              count=1,
              flags=re.M,
          )
          if n != 1:
              raise SystemExit(f"could not patch __version__ in {p}")
          p.write_text(nt, encoding="utf-8")
          print(f"Set __version__ to {ver!r}")
          PY

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pytest responses

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Build binary
        env:
          WRIGHT_LOKI_AUTH: ${{ secrets.LOKI_BASIC_AUTH }}
        run: pyinstaller wright-telemetry.spec

      - name: Verify binary runs
        run: ./dist/wright-telemetry --version

      - name: Create zip
        run: cd dist && zip wright-telemetry-macos.zip wright-telemetry

      - name: Generate SHA256 checksum
        run: cd dist && shasum -a 256 wright-telemetry-macos.zip > wright-telemetry-macos.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wright-telemetry-macos
          path: |
            dist/wright-telemetry-macos.zip
            dist/wright-telemetry-macos.zip.sha256
          if-no-files-found: error

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/wright-telemetry-macos.zip
            dist/wright-telemetry-macos.zip.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
